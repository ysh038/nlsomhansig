name: Lunch Menu Bot

on:
  schedule:
  - cron: '0 1 * * 1-5'  # UTC 01:00 = KST 10:00 (평일)
  workflow_dispatch:

jobs:
  post-lunch-menu:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cache state
      uses: actions/cache@v4
      with:
        path: state.json
        key: lunch-menu-state

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Restore Instagram session
      env:
        INSTAGRAM_SESSION_B64: ${{ secrets.INSTAGRAM_SESSION_B64 }}
      run: |
        if [ -z "$INSTAGRAM_SESSION_B64" ]; then
          echo "INSTAGRAM_SESSION_B64 secret이 설정되지 않았습니다."
          exit 1
        fi
        echo "$INSTAGRAM_SESSION_B64" | base64 -d > session

    - name: Post lunch menu
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
        TARGET_PROFILE: nlsomhansig
      run: python main.py
